name: CodeWarriors-pipeline
on: workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: get pem file
        run: |
          echo "${{secrets.Warriors6}}" > Code.pem
          chmod 400 Code.pem
          ls -lrsth
      - name: cp app.py
        run: scp -o StrictHostKeyChecking=no -i Code.pem app.py ec2-user@65.0.138.6:/home/ec2-user/
      - name: cp req.txt
        run: scp -o StrictHostKeyChecking=no -i Code.pem requirements.txt ec2-user@65.0.138.6:/home/ec2-user/ 
      - name: run app
        run: ssh -o StrictHostKeyChecking=no -i Code.pem ec2-user@65.0.138.6 "cd /home/ec2-user && python3 -m venv venv && source venv/bin/activate && pip3 install -r requirements.txt && python3 app.py"
