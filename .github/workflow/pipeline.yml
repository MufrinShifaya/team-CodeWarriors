name: CodeWarriors-pipeline
on: workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: get pem file
        run: |
          echo "${{secrets.warriors_6}}" > Mufrin05.pem
          chmod 400 Mufrin05.pem
          ls -lrsth
      - name: cp app.py
        run: scp -o StrictHostKeyChecking=no -i Mufrin05.pem app.py ec2-user@3.109.5.133:/home/ec2-user/
      - name: cp req.txt
        run: scp -o StrictHostKeyChecking=no -i Mufrin05.pem requirements.txt ec2-user@3.109.5.133:/home/ec2-user/ 
      - name: run app
        run: ssh -o StrictHostKeyChecking=no -i Mufrin05.pem ec2-user@3.109.5.133 "cd /home/ec2-user && python3 -m venv venv && source venv/bin/activate && pip3 install -r requirements.txt && python3 app.py"
